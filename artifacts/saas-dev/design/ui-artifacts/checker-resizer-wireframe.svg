<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940">
  <rect width="1400" height="940" fill="#f7fbfc"/>
  <text x="70" y="70" font-family="Inter, Arial" font-size="34" font-weight="700" fill="#12343b">Image Size Checker - tool-first layout</text>
  <text x="70" y="108" font-family="Inter, Arial" font-size="17" fill="#47656d">Initial state: upload only. Result state: upload hidden, preview + image info + all preset comparisons.</text>
  <rect x="70" y="145" width="1260" height="190" rx="18" fill="#ffffff" stroke="#c7dce2" stroke-width="2"/>
  <text x="110" y="205" font-family="Inter, Arial" font-size="28" font-weight="700" fill="#12343b">Drop images here</text>
  <text x="110" y="238" font-family="Inter, Arial" font-size="18" fill="#52727a">Batch upload, local-only processing, JPG/PNG/WebP/SVG where supported.</text>
  <rect x="110" y="267" width="155" height="44" rx="10" fill="#0e7490"/>
  <text x="139" y="296" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#ffffff">Choose files</text>
  <rect x="70" y="372" width="600" height="245" rx="18" fill="#ffffff" stroke="#d6e5ea"/>
  <text x="105" y="420" font-family="Inter, Arial" font-size="24" font-weight="700" fill="#12343b">Preview</text>
  <rect x="105" y="446" width="520" height="130" rx="14" fill="#eff6f8" stroke="#d6e5ea"/>
  <line x1="150" y1="545" x2="585" y2="480" stroke="#8fb3be" stroke-width="5"/>
  <rect x="720" y="372" width="610" height="245" rx="18" fill="#ffffff" stroke="#d6e5ea"/>
  <text x="755" y="420" font-family="Inter, Arial" font-size="24" font-weight="700" fill="#12343b">Image information</text>
  <text x="755" y="462" font-family="Inter, Arial" font-size="16" fill="#52727a">File name, dimensions, format, aspect ratio, pixels, size, modified</text>
  <text x="755" y="510" font-family="Inter, Arial" font-size="16" fill="#52727a">Batch summary selects one image while keeping all uploads available.</text>
  <rect x="70" y="650" width="1260" height="230" rx="18" fill="#ffffff" stroke="#d6e5ea"/>
  <text x="105" y="700" font-family="Inter, Arial" font-size="24" font-weight="700" fill="#12343b">Preset fit report</text>
  <rect x="105" y="730" width="360" height="110" rx="12" fill="#e6fffb" stroke="#8fe3d7"/>
  <text x="130" y="768" font-family="Inter, Arial" font-size="18" font-weight="700" fill="#0f766e">Web/SEO</text>
  <text x="130" y="802" font-family="Inter, Arial" font-size="15" fill="#34545c">Open Graph, hero, blog thumbnail, favicon</text>
  <rect x="520" y="730" width="360" height="110" rx="12" fill="#f0f9ff" stroke="#99d4f3"/>
  <text x="545" y="768" font-family="Inter, Arial" font-size="18" font-weight="700" fill="#075985">Social</text>
  <text x="545" y="802" font-family="Inter, Arial" font-size="15" fill="#34545c">Instagram, X, Facebook, LinkedIn, Pinterest</text>
  <rect x="935" y="730" width="360" height="110" rx="12" fill="#fefce8" stroke="#eadf84"/>
  <text x="960" y="768" font-family="Inter, Arial" font-size="18" font-weight="700" fill="#854d0e">Print</text>
  <text x="960" y="802" font-family="Inter, Arial" font-size="15" fill="#34545c">4x6, 5x7, 8x10, A4, Letter plus PPI table</text>
</svg>
